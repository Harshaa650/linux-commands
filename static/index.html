<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Command Reference — AI Assistant</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <h2 class="sidebar-title">Categories</h2>
    <nav id="categoryNav" class="category-nav"></nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="main-inner">
      <h1 class="page-title">Linux Command Reference</h1>
      <div id="commandSections"></div>
    </div>
  </main>

  <!-- RIGHT CHAT PANEL -->
  <aside class="chat-panel">
    <div class="chat-header">
      <h2>Linux AI Assistant</h2>
      <p>Ask me about any command!</p>
    </div>

    <div id="chatMessages" class="chat-messages">
      <div class="msg assistant">
        Hello! Click a command below, or type one in, to get a detailed explanation with syntax and examples.
      </div>
    </div>

    <div class="chat-status" id="chatStatus"></div>

    <form id="chatForm" class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Ask about a command..." autocomplete="off">
      <button type="submit" id="chatSend">Ask</button>
    </form>
  </aside>

</div>

<script src="js/commands.js"></script>
<script src="js/app.js"></script>
</body>
</html>
